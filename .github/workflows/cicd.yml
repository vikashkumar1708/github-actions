name: CI/CD

on:
  workflow_dispatch:

jobs:
# job 1
  code:
    runs-on: ubuntu-latest
    steps:
      - name: code clone
       run: echo "code cloned from github"
# job 2
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build using tools
       run: echo "pipeline is build"
#job 3 
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: testing is done
       run: echo "all esting is done"
#job 4
  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: deployment is done
       run: echo "here deployment is done"
